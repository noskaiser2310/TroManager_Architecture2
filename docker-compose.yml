version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: tromanager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: tromanager
    ports:
      - "5432:5432"
    volumes:
      - tromanager_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/2_seed_data.sql
    restart: unless-stopped

volumes:
  tromanager_pgdata:
