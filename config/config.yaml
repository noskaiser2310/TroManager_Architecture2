# TroManager Configuration

# =========================================================
# Application
# =========================================================
app:
  name: "TroManager"
  version: "0.1.0"
  environment: "development"  # development, staging, production
  debug: true
  log_level: "INFO"
  timezone: "Asia/Ho_Chi_Minh"

  # CORS settings (allow web frontend gọi API)
  cors:
    enabled: true
    # Danh sách origins được phép. Trong dev: "*" cho tất cả.
    # Production: chỉ rõ domain cụ thể, vd ["https://tromanager.example.com"]
    allowed_origins:
      - "*"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Content-Type"
      - "Authorization"
      - "X-Zalo-Signature"
      - "X-Request-ID"
    allow_credentials: false

  # Graceful shutdown settings (khi nhận SIGTERM/SIGINT)
  shutdown:
    # Thời gian chờ in-flight requests drain (giây)
    drain_timeout_seconds: 30.0
    # Thời gian chờ cron jobs hiện tại kết thúc (giây)
    cron_timeout_seconds: 10.0
    # Thời gian chờ DB pool close (giây)
    db_timeout_seconds: 5.0

  # Observability (logging + metrics)
  observability:
    # Request ID middleware
    request_id:
      enabled: true
      log_level: "info"  # info | warning | error | none
      record_metrics: true  # Auto-record HTTP metrics
    # JSON structured logging (production)
    json_logging:
      enabled: true
      redact_sensitive: true  # Auto-redact password/api_key/token
    # Metrics endpoint
    metrics:
      # Expose /metrics (Prometheus format) and /metrics?format=json
      enabled: true
      # Path label normalization (group /admin/approvals/123 thành /admin/approvals/{id})
      normalize_paths: true

# =========================================================
# Database (PostgreSQL + pgvector)
# =========================================================
database:
  host: "localhost"
  port: 5432
  name: "tromanager"
  user: "postgres"
  password: "${DB_PASSWORD}"
  pool_size: 10
  pool_max_overflow: 20
  echo_sql: false
  # Retry config cho startup khi DB chưa sẵn sàng
  retry:
    max_attempts: 5       # Số lần thử kết nối
    initial_delay: 1.0    # Delay ban đầu (giây)
    max_delay: 10.0       # Cap delay giữa các lần retry
    backoff: 2.0          # Hệ số nhân delay (exponential)

# =========================================================
# LLM Configuration (chi tiết xem config/llm_config.yaml)
# =========================================================
llm:
  # File cấu hình riêng cho LLM (API key, URL, model names)
  # Có thể override bằng env LLM_CONFIG_PATH
  config_file: "config/llm_config.yaml"
  
  fast_model:
    # Sẽ được load từ llm_config.yaml
    temperature: 0.3
    max_tokens: 8192
    timeout: 10

  pro_model:
    # Sẽ được load từ llm_config.yaml
    temperature: 0.4
    max_tokens: 8192
    timeout: 90
    
  embedding_model:
    # Sẽ được load từ llm_config.yaml
    dimension: 3072

# =========================================================
# Router Gateway
# =========================================================
router:
  threshold_confidence: 0.5
  
  sensitive_keywords:
    - "tiền"
    - "nợ"
    - "tiền thuê"
    - "tiền điện"
    - "tiền nước"
    - "cọc"
    - "hoàn cọc"
    - "hợp đồng"
    - "gia hạn"
    - "thanh lý"
    - "chấm dứt"
    - "chuyển phòng"
    - "đổi phòng"
    - "hóa đơn"
    - "bill"
    - "sao kê"
    - "phạt"
    - "vi phạm"
    
  complex_keywords:
    - "hỏng"
    - "sửa"
    - "bảo trì"
    - "bảo hành"
    - "điều hòa"
    - "vòi nước"
    - "gửi xe"
    - "đăng ký"
    - "cho thuê"
    - "tìm phòng"
    - "phòng trống"
    - "người ở cùng"
    - "bạn cùng phòng"
    - "đề xuất"
    - "tư vấn"
    - "gợi ý"
    
  safe_keywords:
    - "wifi"
    - "mật khẩu"
    - "internet"
    - "giờ giấc"
    - "giờ đóng cửa"
    - "giờ yên tĩnh"
    - "nội quy"
    - "quy định"
    - "địa chỉ"
    - "số nhà"

# =========================================================
# System 1 (Fast Layer)
# =========================================================
system1:
  embedding_dim: 3072
  cache_similarity_threshold: 0.9
  rag_top_k: 3
  rag_chunk_size: 512
  rag_chunk_overlap: 50
  rag_similarity_threshold: 0.5
  confidence_threshold: 0.7
  max_tokens: 8192
  temperature: 0.3
  enable_cache_warming: true
  
  # Cache TTL in days
  cache_ttl_days: 30

# =========================================================
# System 2 (ReAct Agent)
# =========================================================
system2:
  max_iterations: 4
  max_tokens: 8192
  temperature: 0.4
  enable_dynamic_tool_loading: true
  enable_sensitive_approval: true
  enable_history_compression: true
  history_compression_threshold: 6000

  # Tool loading strategy
  tool_loading: "intent_based"  # intent_based, all

  # Timeout protection (giây) — tránh tool/LLM call treo vô hạn
  tool_timeout_seconds: 30.0    # Mỗi tool call tối đa 30s
  llm_timeout_seconds: 360.0     # Mỗi LLM call tối đa 360s

  # Guardrails fallback message (khi loop breaker triggered)
  guardrails:
    fallback:
      contact_name: "quản lý"
      contact_phone: "0901.234.567"  # TODO: move to .env LANDLORD_PHONE
      message: "Hệ thống đang xử lý yêu cầu phức tạp. Vui lòng liên hệ trực tiếp {contact_label} qua số {contact_phone} để được hỗ trợ nhanh nhất."

# =========================================================
# Tool Registry
# =========================================================
tools:
  decision:
    enabled: true
    tools:
      - "fetch_available_rooms"
      - "calc_rent"
      - "recommend_transfer"
      - "compare_rooms"
      
  knowledge:
    enabled: true
    tools:
      - "query_policies"
      - "get_invoice_detail"
      - "get_contract_status"
      - "get_payment_history"
      - "get_room_info"
      
  automation:
    enabled: true
    tools:
      - "send_zalo"
      - "send_sms"
      - "create_maintenance_ticket"
      - "send_payment_reminder"  # Sensitive
      - "schedule_room_viewing"

# =========================================================
# User Modeling
# =========================================================
user_modeling:
  profile:
    cache_ttl_seconds: 300
    
  behavior:
    summary_window_days: 90
    log_retention_days: 730  # 2 years
    
  memory:
    embedding_dim: 3072
    top_k_retrieval: 3
    decay_rate: 0.95
    decay_threshold: 0.1
    archive_after_days: 90

# =========================================================
# Cron / Proactive Events
# =========================================================
cron:
  enabled: true
  timezone: "Asia/Ho_Chi_Minh"
  
  rules:
    invoice_overdue:
      enabled: true
      check_time: "09:00"
      grace_days: [1, 3, 7]
      
    payment_due_soon:
      enabled: true
      check_time: "08:00"
      notify_days_before: 3
      
    contract_expiring:
      enabled: true
      check_day: 1
      check_time: "10:00"
      notify_days_before: [30, 14, 7, 1]
      
    maintenance_reminder:
      enabled: true
      check_day_of_week: "mon"
      check_time: "08:00"
      
    birthday_greeting:
      enabled: true
      check_time: "07:00"
      
  anti_spam:
    max_reminders_per_week: 2
    min_hours_between: 24

# =========================================================
# Notifications
# =========================================================
notifications:
  zalo:
    enabled: true
    api_url: "https://openapi.zalo.me/v2.0/oa"
    access_token: "${ZALO_ACCESS_TOKEN}"
    oa_id: "${ZALO_OA_ID}"
    timeout: 10
    
  sms:
    enabled: true
    provider: "twilio"  # twilio, mock
    account_sid: "${TWILIO_ACCOUNT_SID}"
    auth_token: "${TWILIO_AUTH_TOKEN}"
    from_number: "${TWILIO_FROM_NUMBER}"

# =========================================================
# Monitoring
# =========================================================
monitoring:
  enable_metrics: true
  metrics_port: 9090
  enable_tracing: false  # Use OpenTelemetry
  
  alerts:
    high_error_rate: 0.05
    high_latency_p99_ms: 15000
    cache_hit_rate_min: 0.5
    fallback_rate_max: 0.3

# =========================================================
# Security
# =========================================================
security:
  encrypt_pii: false  # TODO: implement PII encryption (AES-GCM) before production
  pii_fields:
    - "phone_number"
    - "email"
    
  rate_limit:
    requests_per_minute: 60
    requests_per_hour: 1000
    
  # API keys: add to .env as ADMIN_API_KEY (see admin auth middleware)
  api_keys: []
