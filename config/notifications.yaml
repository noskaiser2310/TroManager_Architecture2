# =====================================================================
# Notifications Configuration (TroManager)
# =====================================================================
# Cấu hình cho Zalo OA, SMS, và các notification channels khác
# Điền giá trị thật hoặc dùng env vars: ${ZALO_ACCESS_TOKEN}
# =====================================================================

zalo:
  enabled: false
  api_url: "https://openapi.zalo.me/v2.0/oa"
  access_token: "${ZALO_ACCESS_TOKEN}"
  oa_id: "${ZALO_OA_ID}"
  timeout: 10

sms:
  enabled: false
  # Provider: "twilio", "esms", "vnpt", "speed"
  provider: "twilio"
  
  # Twilio credentials
  account_sid: "${TWILIO_ACCOUNT_SID}"
  auth_token: "${TWILIO_AUTH_TOKEN}"
  from_number: "${TWILIO_FROM_NUMBER}"
  
  # Vietnamese providers (uncomment khi dùng)
  # api_key: "${ESMS_API_KEY}"
  # secret: "${ESMS_SECRET}"
  # brand_name: "TROHAIDANG"
