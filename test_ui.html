<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TroManager - Test Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12100e;
    --sidebar: #181613;
    --surface: #1e1c18;
    --surface-hover: #28241f;
    --accent: #d4a373;
    --accent-dim: #a67c52;
    --teal: #2a9d8f;
    --teal-dim: #1e7a6e;
    --orange: #c97d3a;
    --text: #f0ece0;
    --text-dim: #8a8070;
    --text-muted: #615a50;
    --user-msg: #3d3228;
    --ai-msg: #1e1c18;
    --border: #28241f;
    --danger: #c14a4a;
    --radius: 12px;
    --radius-sm: 8px;
    --mode-new: #6b5ce7;
    --mode-new-dim: #5247b5;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    line-height: 1.5;
  }

  /* === SIDEBAR === */
  .sidebar {
    width: 250px;
    min-width: 250px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 16px 16px;
    gap: 4px;
    overflow-y: auto;
  }
  .sidebar-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1.2rem;
    color: var(--accent);
    margin-bottom: 0;
    letter-spacing: -0.5px;
  }
  .sidebar-sub {
    font-size: .7rem;
    color: var(--text-muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* Mode section headers */
  .mode-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 8px 6px;
    margin-top: 2px;
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    font-weight: 700;
    border-top: 1px solid var(--border);
  }
  .mode-header:first-of-type { border-top: none; margin-top: 0; }
  .mode-header .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .mode-header .dot.new { background: var(--mode-new); }
  .mode-header .dot.reg { background: var(--teal); }

  /* Mode buttons */
  .mode-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all .2s;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: .85rem;
    text-align: left;
    width: 100%;
  }
  .mode-btn:hover { background: var(--surface-hover); color: var(--text); }
  .mode-btn.active-new {
    background: rgba(107, 92, 231, .12);
    border-color: var(--mode-new-dim);
    color: #b0a3f5;
  }
  .mode-btn.active-reg {
    background: rgba(42, 157, 143, .12);
    border-color: var(--teal-dim);
    color: var(--teal);
  }
  .mode-btn .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem; font-weight: 700;
    flex-shrink: 0;
  }
  .mode-btn.active-new .avatar { background: var(--mode-new-dim); color: #fff; }
  .mode-btn.active-reg .avatar { background: var(--teal-dim); color: #fff; }
  .mode-btn:not(.active-new):not(.active-reg) .avatar { background: var(--surface-hover); }

  /* Tenant list nested */
  .tenant-list { display: flex; flex-direction: column; gap: 2px; margin-left: 0; }
  .tenant-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px 7px 38px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all .15s;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: .8rem;
    text-align: left;
    width: 100%;
  }
  .tenant-btn:hover { background: var(--surface-hover); color: var(--text-dim); }
  .tenant-btn.active {
    color: var(--teal);
    background: rgba(42, 157, 143, .08);
  }
  .tenant-btn .tag {
    margin-left: auto;
    font-size: .65rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    background: var(--surface);
    padding: 1px 6px;
    border-radius: 3px;
  }
  .tenant-btn.active .tag { color: var(--teal-dim); }

  /* Quick queries */
  .quick-label {
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin: 14px 0 4px 8px;
  }
  .quick-btn {
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all .15s;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: .78rem;
    text-align: left;
    width: 100%;
  }
  .quick-btn:hover { background: var(--surface-hover); color: var(--accent); }

  /* === MAIN === */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* Meta bar */
  .meta-bar {
    padding: 10px 24px;
    background: var(--sidebar);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    font-size: .75rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    flex-wrap: wrap;
    align-items: center;
    min-height: 42px;
  }
  .meta-bar .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface);
    font-size: .7rem;
  }
  .meta-bar .tag.tool { color: var(--teal); }
  .meta-bar .tag.action { color: var(--accent); }
  .meta-bar .latency { color: var(--text-dim); }
  .meta-bar .status {
    margin-left: auto;
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .meta-bar .status.ok { color: var(--teal); }
  .meta-bar .status.err { color: var(--danger); }

  /* Mode badge */
  .mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .mode-badge.new {
    background: rgba(107, 92, 231, .15);
    color: #b0a3f5;
  }
  .mode-badge.reg {
    background: rgba(42, 157, 143, .15);
    color: var(--teal);
  }

  /* Chat */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    animation: fadeIn .3s ease;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    align-self: flex-end;
    background: var(--user-msg);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }
  .msg.ai {
    align-self: flex-start;
    background: var(--ai-msg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .msg .tool-badge {
    display: inline-block;
    font-size: .65rem;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface-hover);
    color: var(--teal);
    margin-bottom: 6px;
  }

  /* Typing */
  .typing {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 16px 20px;
    background: var(--ai-msg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: .3; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.3); }
  }

  /* Input */
  .input-area {
    padding: 12px 24px 16px;
    background: var(--sidebar);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    padding: 10px 14px;
    resize: none;
    outline: none;
    transition: border-color .2s;
    line-height: 1.5;
    min-height: 44px;
    max-height: 120px;
  }
  .input-area textarea:focus { border-color: var(--accent-dim); }
  .input-area textarea::placeholder { color: var(--text-muted); }
  .send-btn {
    padding: 10px 20px;
    background: var(--accent-dim);
    border: none;
    border-radius: var(--radius-sm);
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: .85rem;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    height: 44px;
  }
  .send-btn:hover { background: var(--accent); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Welcome */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 8px;
    text-align: center;
  }
  .welcome .icon { font-size: 2.5rem; opacity: .3; }
  .welcome h2 { font-family: 'Archivo Black', sans-serif; color: var(--text-dim); font-size: 1.1rem; }
  .welcome p { font-size: .85rem; max-width: 360px; }

  /* Responsive */
  @media (max-width: 760px) {
    .sidebar { width: 200px; min-width: 200px; padding: 16px 10px; font-size: .8rem; }
    .msg { max-width: 88%; }
    .meta-bar { padding: 8px 16px; gap: 10px; font-size: .7rem; }
    .chat { padding: 16px; }
    .input-area { padding: 8px 16px 12px; }
  }
  @media (max-width: 540px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-title">TROMANAGER</div>
  <div class="sidebar-sub">Test Console</div>

  <!-- Mode 1: New User -->
  <div class="mode-header">
    <span class="dot new"></span> Người dùng mới
  </div>
  <button class="mode-btn" id="modeNew" data-mode="new">
    <span class="avatar">🧑</span>
    <span>Khách vãng lai<small style="display:block;font-size:.65rem;opacity:.6;font-weight:400">Chưa có hồ sơ</small></span>
  </button>

  <!-- Mode 2: Registered -->
  <div class="mode-header">
    <span class="dot reg"></span> Khách thuê đã đăng ký
  </div>
  <button class="mode-btn" id="modeReg" data-mode="reg">
    <span class="avatar">👤</span>
    <span>Chọn khách thuê<small style="display:block;font-size:.65rem;opacity:.6;font-weight:400">Có hồ sơ &amp; lịch sử</small></span>
  </button>
  <div class="tenant-list" id="tenantList"></div>

  <div class="quick-label">Truy vấn nhanh</div>
  <button class="quick-btn" data-msg="Xin chào">👋 Xin chào</button>
  <button class="quick-btn" data-msg="Xem hóa đơn tháng này">📄 Hóa đơn</button>
  <button class="quick-btn" data-msg="Xem hợp đồng của tôi">📋 Hợp đồng</button>
  <button class="quick-btn" data-msg="Lịch sử thanh toán">💳 Lịch sử TT</button>
  <button class="quick-btn" data-msg="Phòng 101">🏠 Phòng của tôi</button>
  <button class="quick-btn" data-msg="Liệt kê khách thuê">👥 Danh sách KT</button>
  <button class="quick-btn" data-msg="Nhắc tôi đóng tiền phòng">⏰ Nhắc nhở</button>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="meta-bar" id="metaBar">
    <span id="modeLabel" style="color:var(--text-muted)">Chọn chế độ</span>
    <span class="status" id="statusBadge"></span>
  </div>

  <div class="chat" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="icon">🏢</div>
      <h2>TroManager Test Console</h2>
      <p>
        Chọn <strong style="color:#b0a3f5">Người dùng mới</strong> để test luồng không có hồ sơ<br>
        hoặc chọn <strong style="color:var(--teal)">Khách thuê đã đăng ký</strong> để test với hồ sơ &amp; lịch sử
      </p>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Nhập tin nhắn..." enterkeyhint="send"></textarea>
    <button class="send-btn" id="sendBtn">Gửi</button>
  </div>
</div>

<script>
// ===== STATE =====
const state = {
  mode: null,        // 'new' | 'reg'
  tenantId: null,    // 1-5 or null for new
  loading: false,
};

const TENANTS = [
  { id: 1, name: 'Nguyễn Văn Minh', room: '101' },
  { id: 2, name: 'Trần Thị Hoa',   room: '102' },
  { id: 3, name: 'Lê Hoàng Anh',    room: '103' },
  { id: 4, name: 'Phạm Minh Tâm',  room: '104' },
  { id: 5, name: 'Đỗ Thu Hương',   room: '105' },
];

// ===== DOM REFS =====
const chatArea = document.getElementById('chatArea');
const welcome = document.getElementById('welcome');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const metaBar = document.getElementById('metaBar');
const statusBadge = document.getElementById('statusBadge');
const modeLabel = document.getElementById('modeLabel');
const modeNewBtn = document.getElementById('modeNew');
const modeRegBtn = document.getElementById('modeReg');
const tenantList = document.getElementById('tenantList');

// ===== RENDER =====
function renderTenants() {
  tenantList.innerHTML = TENANTS.map(t => `
    <button class="tenant-btn ${state.mode === 'reg' && state.tenantId === t.id ? 'active' : ''}"
            data-id="${t.id}">
      <span>${t.name}</span>
      <span class="tag">${t.room}</span>
    </button>
  `).join('');
  tenantList.querySelectorAll('.tenant-btn').forEach(btn => {
    btn.addEventListener('click', () => selectTenant(parseInt(btn.dataset.id)));
  });
}

function updateSidebar() {
  // Mode buttons
  modeNewBtn.className = 'mode-btn' + (state.mode === 'new' ? ' active-new' : '');
  modeRegBtn.className = 'mode-btn' + (state.mode === 'reg' ? ' active-reg' : '');
  renderTenants();
}

function updateMeta(html, status = '') {
  const mode = state.mode;
  let badge = '';
  if (mode === 'new') {
    badge = '<span class="mode-badge new">🧑 Người dùng mới</span>';
  } else if (mode === 'reg') {
    const t = TENANTS.find(x => x.id === state.tenantId);
    badge = `<span class="mode-badge reg">👤 ${t ? t.name : '...'}</span>`;
  }
  metaBar.innerHTML = badge + ' ' + html;
  statusBadge.textContent = status;
  statusBadge.className = 'status' + (status === 'OK' ? ' ok' : status === 'ERR' ? ' err' : '');
}

// ===== MODE SELECTION =====
function setMode(mode) {
  state.mode = mode;
  if (mode === 'new') {
    state.tenantId = null;
  } else {
    // Default to first tenant
    state.tenantId = TENANTS[0].id;
  }
  updateSidebar();
  updateMeta('', '');
  // Enable input
  input.disabled = false;
  input.placeholder = mode === 'new' ? 'Nhập tin nhắn với tư cách khách vãng lai...' : `Nhập tin nhắn với tư cách ${TENANTS.find(t => t.id === state.tenantId).name}...`;
  input.focus();
}

function selectTenant(id) {
  if (state.mode !== 'reg') setMode('reg');
  state.tenantId = id;
  updateSidebar();
  const t = TENANTS.find(x => x.id === id);
  updateMeta('', '');
  input.placeholder = `Nhập tin nhắn với tư cách ${t.name}...`;
  input.focus();
}

modeNewBtn.addEventListener('click', () => setMode('new'));
modeRegBtn.addEventListener('click', () => setMode('reg'));

// ===== CHAT =====
function addMessage(role, content, meta = null) {
  welcome?.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (meta && meta.tool) {
    div.innerHTML = `<span class="tool-badge">⚙ ${meta.tool} ${meta.latency ? ' · ' + meta.latency + 'ms' : ''}</span><br>` + content;
  } else {
    div.textContent = content;
  }
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  welcome?.remove();
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typingIndicator';
  el.innerHTML = '<span></span><span></span><span></span>';
  chatArea.appendChild(el);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideTyping() {
  document.getElementById('typingIndicator')?.remove();
}

async function sendMessage(msg) {
  if (state.loading || !msg.trim() || !state.mode) return;

  if (!state.mode) {
    addMessage('ai', '⚠️ Vui lòng chọn chế độ: Người dùng mới hoặc Khách thuê đã đăng ký');
    return;
  }

  state.loading = true;
  sendBtn.disabled = true;

  addMessage('user', msg.trim());
  showTyping();
  input.value = '';
  input.style.height = 'auto';

  try {
    const body = {
      source: 'api',
      message: msg.trim(),
    };
    if (state.mode === 'reg' && state.tenantId) {
      body.tenant_id = state.tenantId;
    }

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    hideTyping();
    const data = await res.json();

    if (data.answer) {
      const tools = data.tools_used || [];
      const actions = data.actions_taken || [];
      const latency = data.latency_ms || 0;
      const conf = data.confidence || 0;
      const sys = data.system_used || '';

      let metaHtml = '';
      if (sys) metaHtml += `<span class="tag" style="color:var(--accent)">${sys}</span> `;
      if (tools.length) {
        metaHtml += tools.map(t => `<span class="tag tool">⚙ ${t}</span>`).join(' ');
      }
      if (actions.length) {
        metaHtml += actions.map(a => `<span class="tag action">✓ ${a}</span>`).join(' ');
      }
      metaHtml += `<span class="latency">${latency}ms</span>`;
      if (conf) metaHtml += `<span class="latency">· conf ${(conf*100).toFixed(0)}%</span>`;

      updateMeta(metaHtml, tools.length ? 'TOOLS' : 'OK');

      addMessage('ai', data.answer, tools.length ? { tool: tools.join(', '), latency } : null);
    } else {
      updateMeta('', 'ERR');
      addMessage('ai', '⚠️ Không nhận được phản hồi từ server');
    }
  } catch (err) {
    hideTyping();
    updateMeta('', 'ERR');
    addMessage('ai', '⚠️ Lỗi kết nối: ' + err.message);
  }

  state.loading = false;
  sendBtn.disabled = false;
  input.focus();
}

// ===== INPUT EVENTS =====
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input.value); }
});
sendBtn.addEventListener('click', () => sendMessage(input.value));

// ===== QUICK BUTTONS =====
document.querySelectorAll('.quick-btn[data-msg]').forEach(btn => {
  btn.addEventListener('click', () => sendMessage(btn.dataset.msg));
});

// ===== INIT =====
renderTenants();
setMode('reg'); // Default to registered mode
input.disabled = true;
</script>
</body>
</html>
