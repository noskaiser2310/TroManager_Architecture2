[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py audit_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
markers =
    unit: Unit tests (no external deps, fast)
    integration: Integration tests (needs DB mock/live)
    audit: Audit, security & performance tests
    e2e: End-to-end tests (needs live server + DB)
